<div class="container">
  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium" #input>
  </mat-form-field>
  
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  
    <ng-container matColumnDef="computerId">
      <th mat-header-cell *matHeaderCellDef> computerId </th>
      <td mat-cell *matCellDef="let element"> {{element.computerId}} </td>
    </ng-container>
  
    <ng-container matColumnDef="cpu">
      <th mat-header-cell *matHeaderCellDef> cpu </th>
      <td mat-cell *matCellDef="let element"> {{element.cpu}} </td>
    </ng-container>
  
    <ng-container matColumnDef="ram">
      <th mat-header-cell *matHeaderCellDef> ram </th>
      <td mat-cell *matCellDef="let element"> {{element.ram}} </td>
    </ng-container>
  
    <ng-container matColumnDef="gpu">
      <th mat-header-cell *matHeaderCellDef> gpu </th>
      <td mat-cell *matCellDef="let element"> {{element.gpu}} </td>
    </ng-container>

    <ng-container matColumnDef="case">
      <th mat-header-cell *matHeaderCellDef> case </th>
      <td mat-cell *matCellDef="let element"> {{element.case}} </td>
    </ng-container>

    <ng-container matColumnDef="psu">
      <th mat-header-cell *matHeaderCellDef> psu </th>
      <td mat-cell *matCellDef="let element"> {{element.psu}} </td>
    </ng-container>
  
    <ng-container matColumnDef="motherboard">
      <th mat-header-cell *matHeaderCellDef> motherboard </th>
      <td mat-cell *matCellDef="let element"> {{element.motherboard}} </td>
    </ng-container>
  
    <ng-container matColumnDef="os">
      <th mat-header-cell *matHeaderCellDef> os </th>
      <td mat-cell *matCellDef="let element"> {{element.os}} </td>
    </ng-container>
  
    <ng-container matColumnDef="ownerId">
      <th mat-header-cell *matHeaderCellDef> ownerId </th>
      <td mat-cell *matCellDef="let element"> {{element.ownerId}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>
</div>
